membership_calculation:
  default_mode: overlap_integral
  optional_modes: [three_point_mean, centroid_sampling]
  numerical_integration:
    method: trapezoidal
    points: 200


mamdani_sensitivity:
  enabled: true
  points: 200

consequent_fuzzy_sets:
  default: {points: [0.45, 0.70, 1.00, 1.00]}
  syndrome: {points: [0.45, 0.70, 1.00, 1.00]}

mapping_policy:
  log_unmapped: true
  trigger_review_if_confidence_above: 0.85
  coverage_warning_threshold: 0.70

uncertainty_propagation:
  mode: montecarlo
  n_samples: 200
  n_samples_formal: 1000
  apply_to: low_icc_only
  icc_threshold: 0.75
  vectorized: true
  random_seed: 20260531


aggregation:
